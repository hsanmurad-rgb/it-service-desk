
<h2 class="sr-only">Corporate IT Service Desk — submit and track employee IT requests</h2>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.header{padding:1.25rem 1.5rem;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:500;color:var(--color-text-primary)}
.logo i{font-size:20px;color:var(--color-text-secondary)}
.badge{font-size:11px;padding:3px 8px;border-radius:99px;font-weight:500}
.badge-info{background:var(--color-background-info);color:var(--color-text-info)}
.badge-warn{background:var(--color-background-warning);color:var(--color-text-warning)}
.badge-danger{background:var(--color-background-danger);color:var(--color-text-danger)}
.badge-success{background:var(--color-background-success);color:var(--color-text-success)}
.badge-gray{background:var(--color-background-secondary);color:var(--color-text-secondary)}
.tabs{display:flex;gap:0;border-bottom:0.5px solid var(--color-border-tertiary);padding:0 1.5rem}
.tab{padding:10px 16px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;color:var(--color-text-secondary);transition:all 0.15s}
.tab.active{color:var(--color-text-primary);border-bottom-color:var(--color-text-primary)}
.tab:hover:not(.active){color:var(--color-text-primary)}
.pane{display:none;padding:1.25rem 1.5rem}
.pane.active{display:block}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.25rem}
.metric{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:0.85rem 1rem}
.metric-label{font-size:12px;color:var(--color-text-secondary);margin-bottom:4px}
.metric-val{font-size:22px;font-weight:500;color:var(--color-text-primary)}
.metric-sub{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
.ticket-list{display:flex;flex-direction:column;gap:8px}
.ticket{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:0.9rem 1rem;cursor:pointer;transition:border-color 0.15s}
.ticket:hover{border-color:var(--color-border-secondary)}
.ticket-top{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.ticket-id{font-size:11px;color:var(--color-text-secondary);font-family:var(--font-mono)}
.ticket-title{font-size:14px;font-weight:500;color:var(--color-text-primary);flex:1}
.ticket-meta{display:flex;align-items:center;gap:12px;font-size:12px;color:var(--color-text-secondary)}
.ticket-meta i{font-size:14px;vertical-align:-2px}
.priority-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.p-critical{background:#E24B4A}
.p-high{background:#EF9F27}
.p-medium{background:#378ADD}
.p-low{background:#1D9E75}
.filter-bar{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.filter-btn{font-size:12px;padding:5px 12px;border-radius:99px;border:0.5px solid var(--color-border-secondary);background:transparent;cursor:pointer;color:var(--color-text-secondary);transition:all 0.15s}
.filter-btn.active{background:var(--color-text-primary);color:var(--color-background-primary);border-color:var(--color-text-primary)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-grid.full{grid-template-columns:1fr}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:12px;color:var(--color-text-secondary)}
.field input,.field select,.field textarea{width:100%;font-size:14px}
.field textarea{resize:vertical;min-height:80px}
.submit-btn{margin-top:4px;width:100%;padding:9px;font-size:14px;font-weight:500;background:var(--color-text-primary);color:var(--color-background-primary);border:none;border-radius:var(--border-radius-md);cursor:pointer;transition:opacity 0.15s}
.submit-btn:hover{opacity:0.85}
.section-title{font-size:13px;font-weight:500;color:var(--color-text-secondary);margin-bottom:10px;text-transform:uppercase;letter-spacing:0.05em}
.empty{text-align:center;padding:2rem;color:var(--color-text-secondary);font-size:13px}
.toast{position:fixed;bottom:20px;right:20px;background:var(--color-text-primary);color:var(--color-background-primary);padding:10px 18px;border-radius:var(--border-radius-md);font-size:13px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
</style>

<div class="header">
  <div class="logo"><i class="ti ti-device-desktop-analytics" aria-hidden="true"></i> IT Service Desk</div>
  <div style="display:flex;align-items:center;gap:8px">
    <span class="badge badge-gray"><i class="ti ti-building" style="font-size:11px;vertical-align:-1px" aria-hidden="true"></i> Corporate Office</span>
    <span class="badge badge-danger" id="urgent-badge">2 urgent</span>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('dashboard')"><i class="ti ti-layout-dashboard" style="font-size:14px;vertical-align:-2px;margin-right:4px" aria-hidden="true"></i>Dashboard</div>
  <div class="tab" onclick="switchTab('tickets')"><i class="ti ti-ticket" style="font-size:14px;vertical-align:-2px;margin-right:4px" aria-hidden="true"></i>Tickets</div>
  <div class="tab" onclick="switchTab('new')"><i class="ti ti-plus" style="font-size:14px;vertical-align:-2px;margin-right:4px" aria-hidden="true"></i>New Request</div>
</div>

<div id="pane-dashboard" class="pane active">
  <div class="metrics">
    <div class="metric"><div class="metric-label">Open tickets</div><div class="metric-val" id="m-open">0</div><div class="metric-sub">Awaiting action</div></div>
    <div class="metric"><div class="metric-label">In progress</div><div class="metric-val" id="m-inprog">0</div><div class="metric-sub">Being worked on</div></div>
    <div class="metric"><div class="metric-label">Resolved today</div><div class="metric-val" id="m-resolved">0</div><div class="metric-sub">Closed</div></div>
    <div class="metric"><div class="metric-label">Critical</div><div class="metric-val" id="m-critical" style="color:#E24B4A">0</div><div class="metric-sub">Needs immediate action</div></div>
  </div>

  <div class="section-title">Recent activity</div>
  <div class="ticket-list" id="recent-list"></div>
</div>

<div id="pane-tickets" class="pane">
  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterTickets('all',this)">All</button>
    <button class="filter-btn" onclick="filterTickets('open',this)">Open</button>
    <button class="filter-btn" onclick="filterTickets('in-progress',this)">In progress</button>
    <button class="filter-btn" onclick="filterTickets('resolved',this)">Resolved</button>
    <button class="filter-btn" onclick="filterTickets('critical',this)">Critical</button>
  </div>
  <div class="ticket-list" id="all-list"></div>
</div>

<div id="pane-new" class="pane">
  <div class="section-title" style="margin-bottom:16px">Submit an IT request</div>
  <div class="form-grid">
    <div class="field"><label>Your name</label><input type="text" id="f-name" placeholder="Full name"></div>
    <div class="field"><label>Department</label>
      <select id="f-dept">
        <option value="">Select department</option>
        <option>Production</option><option>Quality Control</option><option>Logistics</option>
        <option>HR</option><option>Finance</option><option>Management</option><option>Sales</option>
      </select>
    </div>
  </div>
  <div class="form-grid" style="margin-top:12px">
    <div class="field"><label>Category</label>
      <select id="f-cat">
        <option value="">Select category</option>
        <option>Hardware issue</option><option>Software / Application</option><option>Network / Internet</option>
        <option>Account access</option><option>Email</option><option>Printer / Scanner</option>
        <option>ERP / MES system</option><option>CCTV / Physical security</option><option>Other</option>
      </select>
    </div>
    <div class="field"><label>Priority</label>
      <select id="f-priority">
        <option value="low">Low — can wait</option>
        <option value="medium" selected>Medium — within the day</option>
        <option value="high">High — within 2 hours</option>
        <option value="critical">Critical — system down</option>
      </select>
    </div>
  </div>
  <div class="form-grid full" style="margin-top:12px">
    <div class="field"><label>Subject</label><input type="text" id="f-title" placeholder="Brief description of the issue"></div>
  </div>
  <div class="form-grid full" style="margin-top:12px">
    <div class="field"><label>Details</label><textarea id="f-desc" placeholder="Describe the issue in detail — what happened, when it started, any error messages..."></textarea></div>
  </div>
  <button class="submit-btn" onclick="submitTicket()"><i class="ti ti-send" aria-hidden="true"></i> Submit request</button>
</div>

<div class="toast" id="toast"></div>

<script>
const CATS = {
  'Hardware issue':'ti-cpu','Software / Application':'ti-apps','Network / Internet':'ti-wifi',
  'Account access':'ti-lock','Email':'ti-mail','Printer / Scanner':'ti-printer',
  'ERP / MES system':'ti-database','CCTV / Physical security':'ti-shield','Other':'ti-help-circle'
};
const PRIO_LABELS = {critical:'Critical',high:'High',medium:'Medium',low:'Low'};
const STATUS_LABELS = {'open':'Open','in-progress':'In progress','resolved':'Resolved'};

let tickets = [
  {id:'INC-001',title:'Production MES system unresponsive',dept:'Production',cat:'ERP / MES system',priority:'critical',status:'open',name:'Rafiqul Islam',time:'09:14',desc:'The MES terminal on line 3 is completely frozen. Cannot log production entries.'},
  {id:'INC-002',title:'Email not syncing on laptop',dept:'Finance',cat:'Email',priority:'medium',status:'in-progress',name:'Nadia Akhter',time:'09:45',desc:'Outlook stopped syncing since yesterday afternoon.'},
  {id:'INC-003',title:'Network printer offline — floor B2',dept:'Logistics',cat:'Printer / Scanner',priority:'high',status:'open',name:'Karim Hossain',time:'10:02',desc:'Shared printer is offline, all logistics staff affected.'},
  {id:'INC-004',title:'VPN access denied for remote login',dept:'Management',cat:'Account access',priority:'high',status:'in-progress',name:'Shirin Rahman',time:'10:30',desc:'Cannot connect to VPN from home office. Getting auth error.'},
  {id:'INC-005',title:'Barcode scanner not detected',dept:'Quality Control',cat:'Hardware issue',priority:'medium',status:'resolved',name:'Farhan Ali',time:'08:00',desc:'USB barcode scanner disappeared from device list after Windows update.'},
  {id:'INC-006',title:'CCTV feed frozen on monitor 2',dept:'Management',cat:'CCTV / Physical security',priority:'critical',status:'open',name:'Sumaiya Begum',time:'11:15',desc:'Security monitor 2 shows frozen frame. Need to check camera connectivity.'},
];

let counter = 7;

function statusBadge(s){
  const map={open:'badge-info','in-progress':'badge-warn',resolved:'badge-success'};
  return `<span class="badge ${map[s]||'badge-gray'}">${STATUS_LABELS[s]||s}</span>`;
}

function priorityDot(p){
  return `<span class="priority-dot p-${p}" title="${PRIO_LABELS[p]||p}"></span>`;
}

function renderTicket(t){
  const icon = CATS[t.cat]||'ti-help-circle';
  return `<div class="ticket" onclick="sendPrompt('Tell me more about ticket ${t.id}: ${t.title}')">
    <div class="ticket-top">
      ${priorityDot(t.priority)}
      <span class="ticket-id">${t.id}</span>
      <span class="ticket-title">${t.title}</span>
      ${statusBadge(t.status)}
    </div>
    <div class="ticket-meta">
      <span><i class="ti ti-user" aria-hidden="true"></i> ${t.name}</span>
      <span><i class="ti ${icon}" aria-hidden="true"></i> ${t.cat}</span>
      <span><i class="ti ti-building" aria-hidden="true"></i> ${t.dept}</span>
      <span><i class="ti ti-clock" aria-hidden="true"></i> ${t.time}</span>
    </div>
  </div>`;
}

function updateMetrics(){
  const open = tickets.filter(t=>t.status==='open').length;
  const inp = tickets.filter(t=>t.status==='in-progress').length;
  const res = tickets.filter(t=>t.status==='resolved').length;
  const crit = tickets.filter(t=>t.priority==='critical').length;
  document.getElementById('m-open').textContent = open;
  document.getElementById('m-inprog').textContent = inp;
  document.getElementById('m-resolved').textContent = res;
  document.getElementById('m-critical').textContent = crit;
  const urg = tickets.filter(t=>t.priority==='critical'&&t.status!=='resolved').length;
  const badge = document.getElementById('urgent-badge');
  badge.textContent = urg > 0 ? `${urg} urgent` : 'all clear';
  badge.className = urg > 0 ? 'badge badge-danger' : 'badge badge-success';
}

function renderRecent(){
  const list = document.getElementById('recent-list');
  const recent = [...tickets].reverse().slice(0,4);
  list.innerHTML = recent.map(renderTicket).join('') || '<div class="empty">No tickets yet.</div>';
}

function renderAll(filter='all'){
  const list = document.getElementById('all-list');
  let filtered = tickets;
  if(filter==='critical') filtered = tickets.filter(t=>t.priority==='critical');
  else if(filter!=='all') filtered = tickets.filter(t=>t.status===filter);
  list.innerHTML = filtered.length ? [...filtered].reverse().map(renderTicket).join('') : '<div class="empty">No tickets match this filter.</div>';
}

function switchTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  const tabs = ['dashboard','tickets','new'];
  document.querySelectorAll('.tab')[tabs.indexOf(name)].classList.add('active');
  document.getElementById('pane-'+name).classList.add('active');
  if(name==='tickets') renderAll();
  if(name==='dashboard'){updateMetrics();renderRecent();}
}

function filterTickets(f,btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderAll(f);
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

function submitTicket(){
  const name=document.getElementById('f-name').value.trim();
  const dept=document.getElementById('f-dept').value;
  const cat=document.getElementById('f-cat').value;
  const priority=document.getElementById('f-priority').value;
  const title=document.getElementById('f-title').value.trim();
  const desc=document.getElementById('f-desc').value.trim();
  if(!name||!dept||!cat||!title){showToast('Please fill in all required fields.');return;}
  const now=new Date();
  const time=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  const id='INC-'+String(counter).padStart(3,'0');counter++;
  tickets.push({id,title,dept,cat,priority,status:'open',name,time,desc});
  showToast(`Ticket ${id} submitted successfully!`);
  document.getElementById('f-name').value='';document.getElementById('f-dept').value='';
  document.getElementById('f-cat').value='';document.getElementById('f-priority').value='medium';
  document.getElementById('f-title').value='';document.getElementById('f-desc').value='';
  updateMetrics();renderRecent();
  setTimeout(()=>switchTab('tickets'),1200);
}

updateMetrics();renderRecent();renderAll();
</script>
